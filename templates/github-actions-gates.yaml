# GitHub Actions workflow for AI Harness gates
# Copy this to .github/workflows/harness-gates.yaml in your project
#
# Gate tiers:
#   DEFAULT (always run): secrets, boundaries, structure, spec, layers, security, deps
#   OPT-IN (commented out below): complexity, mutation, performance, ai-antipatterns

name: Harness Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  default-gates:
    name: Default Gates (Blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secrets
        run: bash .harness/gates/check-secrets.sh .

      - name: Boundaries
        run: bash .harness/gates/check-boundaries.sh .

      - name: Structure
        run: bash .harness/gates/check-structure.sh .

      - name: Layers
        run: bash .harness/gates/check-layers.sh .

      - name: Security (SAST)
        run: bash .harness/gates/check-security.sh .

      - name: Dependencies
        run: bash .harness/gates/check-deps.sh .

      - name: Spec completeness
        run: |
          if [ -d ".harness/ouroboros/seeds" ]; then
            bash .harness/gates/check-spec.sh .
          else
            echo "::notice::No seeds found — skipping spec gate."
          fi

  # ──────────────────────────────────────────────────────────────
  # SONARQUBE — Blocking (runs after default-gates pass)
  # Requires secrets: SONAR_TOKEN, SONAR_HOST_URL
  # Results saved to .harness/ouroboros/sonarqube/ for /evolve reference
  # ──────────────────────────────────────────────────────────────
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: default-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Save result for /evolve
        if: always()
        run: |
          mkdir -p .harness/ouroboros/sonarqube
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"${{ job.status }}\",\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\"}" \
            > .harness/ouroboros/sonarqube/latest-result.json

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-result
          path: .harness/ouroboros/sonarqube/latest-result.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # OPT-IN GATES — uncomment to enable
  # Typically slower, more opinionated, or project-specific.
  # ──────────────────────────────────────────────────────────────
