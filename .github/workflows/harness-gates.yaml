# GitHub Actions workflow for ai-harness-fresh
# template 레포 자체 CI — sparrow-mock SAST + SonarQube
# default harness gates는 프로젝트에 harness 설치 후 실행

name: Harness Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────
  # SPARROW MOCK SAST — Blocking
  # 향후 실제 Sparrow 라이선스 확보 시 check-sparrow-mock.sh만 교체
  # ──────────────────────────────────────────────────────────────
  sparrow-mock:
    name: Sparrow Mock SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SAST Gate
        run: bash gates/check-sast-gate.sh . --full

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sparrow-result
          path: .harness/ouroboros/reports/sparrow/latest-result.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # SONARQUBE — Blocking (runs after sparrow-mock pass)
  # Requires secrets: SONAR_TOKEN, SONAR_HOST_URL
  # ──────────────────────────────────────────────────────────────
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: sparrow-mock
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Save result for /evolve
        if: always()
        run: |
          mkdir -p .harness/ouroboros/reports/sonarqube
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"${{ job.status }}\",\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\"}" \
            > .harness/ouroboros/reports/sonarqube/latest-result.json

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-result
          path: .harness/ouroboros/reports/sonarqube/latest-result.json
          retention-days: 30
